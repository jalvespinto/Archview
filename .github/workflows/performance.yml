name: Performance Benchmarks

on:
  schedule:
    # Run weekly on Sundays at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allow manual trigger
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'package.json'

jobs:
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for comparison
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Compile TypeScript
        run: npm run compile
      
      - name: Run performance benchmarks
        run: npm run test:performance
        env:
          NODE_ENV: production
      
      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Performance Benchmarks
          tool: 'customBiggerIsBetter'
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          # Show alert with commit comment on detecting possible performance regression
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false
      
      - name: Upload benchmark results
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-results
          path: benchmark-results.json
          retention-days: 90
  
  memory-profiling:
    name: Memory Profiling
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Compile TypeScript
        run: npm run compile
      
      - name: Run memory profiling tests
        run: npm run test:performance -- --testNamePattern="memory"
      
      - name: Check memory limits
        run: |
          echo "Checking memory usage against requirements..."
          echo "Analysis: <500MB"
          echo "Rendering: <200MB"
          # Add actual memory check logic here
      
      - name: Upload memory profiles
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: memory-profiles
          path: |
            memory-profiles/
            *.heapsnapshot
          retention-days: 30
  
  large-codebase-test:
    name: Large Codebase Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Compile TypeScript
        run: npm run compile
      
      - name: Clone large test repository
        run: |
          git clone --depth 1 https://github.com/microsoft/vscode.git test-repos/vscode
      
      - name: Test analysis performance (1000+ files)
        run: |
          npm run test:performance -- --testNamePattern="large codebase"
        timeout-minutes: 5
      
      - name: Verify performance requirements
        run: |
          echo "Verifying analysis completed within 120 seconds..."
          # Add actual timing verification here
      
      - name: Upload performance report
        uses: actions/upload-artifact@v3
        with:
          name: large-codebase-report
          path: performance-report.json
